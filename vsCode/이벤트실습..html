<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    button {
      width: 400px;
      height: 100px;
      border-radius: 10px;
      border-style: none;
      color: white;
    }

    #grn {
      background-color: green;
    }

    #org {
      background-color: orange;
    }

    #pup {
      background-color: purple;
    }

    p {
      display: flex;
      width: 1250px;
      height: 700px;
      background-color: aliceblue;
      border-radius: 40px;
      margin: 15px auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <button class="btn" id="grn" onclick="clickEvent('green')">Green</button>
    <button class="btn" id="org" onclick="clickEvent('orange')">Orange</button>
    <button class="btn" id="pup" onclick="clickEvent('purple')">Purple</button>
  </div>
  <p class="boxInput"></p>
  <script>
    function clickEvent(color) {
      const box = document.querySelector(".boxInput");
      box.style.backgroundColor = color;

    }
  </script>
</body>

</html>
